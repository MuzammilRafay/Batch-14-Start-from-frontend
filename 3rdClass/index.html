<!doctype html>
<html lang="en">
  <head>

    <title>Html Css Flexbox</title>
    <!-- flex -->
    <!-- https://css-tricks.com/snippets/css/a-guide-to-flexbox/ -->

    <!-- Simple Definition:

        Flexbox is a CSS layout system that helps 
        us arrange items in a row or column and 
        control their spacing and alignment. 
    -->
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        padding-top: 10px;
      }
      #parent-element {
        border: 1px solid red;
        padding: 2px;
        display: flex;
        /* gap: 20px; */
        /* height: 300px; */

        /* flex-direction: row | row-reverse | column | column-reverse; */
        /* flex-direction: row-reverse; */
        /* flex-direction: column; */
        /* flex-direction: column-reverse; */

        /* flex-wrap: nowrap; */
        /* flex-wrap: wrap; */
        /* flex-wrap: wrap-reverse; */

        /* justify-content: flex-start; */
        /* justify-content: flex-end; */
        /* justify-content: center; */
        /* justify-content: space-between; */
        /* justify-content: space-around; */
        /* justify-content: space-evenly; */

        /* align-items: stretch; */
        /* align-items: flex-start; */
        /* align-items: flex-end; */
        /* align-items: center; */
      }
      .child-elements {
        background-color: antiquewhite;
        border: 1px solid yellowgreen;
        padding: 20px;
      }
      /* : pseduo class */
      .child-elements:nth-child(1) {
        /* order: 3; */
        /* flex-grow: 1; */
      }
      .child-elements:nth-child(2) {
        /* order: 2; */
        /* flex-grow: 2; */
        flex-basis: 20%;
        /* width: 20%; */
        /* flex-basis is like width */
        align-self: flex-end;
      }
      .child-elements:nth-child(3) {
        /* order: 1; */
        /* flex-grow: 1; */
      }
      /* .child-elements:hover {
        margin-bottom: 20px;
      } */
    </style>
  </head>
  <body>
    <div id="parent-element">
      <div class="child-elements">Item 1</div>
      <div class="child-elements">Item 2</div>
      <div class="child-elements">Item 3</div>
    </div>
  </body>
</html>
