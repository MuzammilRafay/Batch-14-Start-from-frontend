<!doctype html>
<html>
  <head>
    <title>2nd Layout</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      h3 {
        color: yellow;
      }
      p {
        /* text align ki property block elements par work karti hai */
        /* text-align: center; */
      }
      #first-paragraph {
        border: 1px solid red;
        font-size: 40px;
        font-family: Arial, Helvetica, sans-serif;
        background-color: purple;
        color: white;
      }
      .multiple-paragraph {
        border: 2px solid orange;
        padding: 20px; /* box ke ander space dena ho to padding */
        /* margin: 20px; */
        /* box ke bahar se space dena ho to padding */
        margin-bottom: 20px;
        /* bottom = niche */
      }

      /* id attribute = it will select only specific element (1 element ko select karega) */
      /* class attribute = you can work on multiple elements */

      /* id attribute css mein select karte ho # se */
      /* class attribute css mein select karte ho . se */
    </style>
  </head>
  <body>
    <!-- <h1 style="color: red">Working</h1> -->
    <!-- INLINE STYLING -->
    <h2>Heading Two</h2>
    <h3>Heading Three</h3>
    <h4>Heading Four</h4>
    <h5>Heading Five</h5>
    <h6>Heading Six</h6>
    <p id="first-paragraph">This is a paragraph</p>
    <p>This is a paragraph</p>
    <p class="multiple-paragraph">This is a paragraph</p>
    <p class="multiple-paragraph">This is a paragraph</p>
    <div>This is a div (block element)</div>
  </body>
</html>
